<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — NairaPlus</title>
<meta name="theme-color" content="#1B7340">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="mark" style="width:34px;height:34px;background:var(--green);border-radius:8px;color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;">N+</span>
      <strong>NairaPlus</strong>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to check your wallet and tasks.</p>

    <div id="formMsg" class="form-msg" style="display:none;"></div>

    <form id="loginForm">
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="chidera@example.com">
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••">
        </div>
      </div>

      <a href="#" class="forgot">Forgot password?</a>

      <button class="btn btn-primary btn-block" type="submit">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign in
      </button>
    </form>

    <div class="divider">or</div>

    <p class="switch-line">New to NairaPlus? <a href="register.html">Create a free account</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app-auth.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const msgBox = document.getElementById('formMsg');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const result = await npLoginUser(email, password);

    if(result.success){
      msgBox.textContent = result.message + ' Redirecting…';
      msgBox.className = 'form-msg ok';
      msgBox.style.display = 'block';
      setTimeout(()=> window.location.href = 'dashboard.html', 500);
    } else {
      msgBox.textContent = result.message;
      msgBox.className = 'form-msg err';
      msgBox.style.display = 'block';
    }
  });
</script>
</body>
</html>
