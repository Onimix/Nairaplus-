<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — NairaPlus</title>
<meta name="theme-color" content="#1B7340">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="mark" style="width:34px;height:34px;background:var(--green);border-radius:8px;color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;">N+</span>
      <strong>NairaPlus</strong>
    </div>
    <h1>Create your account</h1>
    <p class="sub">Start earning real cash for honest reviews.</p>

    <div id="formMsg" class="form-msg" style="display:none;"></div>

    <form id="registerForm">
      <div class="row-2">
        <div class="field">
          <label>First name</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="firstName" placeholder="Chidera">
          </div>
        </div>
        <div class="field">
          <label>Last name</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="lastName" placeholder="Okafor">
          </div>
        </div>
      </div>

      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="chidera@example.com">
        </div>
      </div>

      <div class="field">
        <label>Phone number</label>
        <div class="input-wrap">
          <i class="fa-solid fa-phone"></i>
          <input type="text" id="phone" placeholder="+234 801 234 5678">
        </div>
      </div>

      <div class="field">
        <label>Referral code (optional)</label>
        <div class="input-wrap">
          <i class="fa-solid fa-gift"></i>
          <input type="text" id="referralCode" placeholder="e.g. NPLUS2K3">
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••">
          </div>
        </div>
        <div class="field">
          <label>Confirm password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="••••••••">
          </div>
        </div>
      </div>

      <div class="check-row">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to NairaPlus' <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
      </div>

      <button class="btn btn-primary btn-block" type="submit">
        <i class="fa-solid fa-rocket"></i> Create free account
      </button>
    </form>

    <div class="trust-badge"><i class="fa-solid fa-building-columns"></i> Bank-verified withdrawals · No hidden fees</div>

    <p class="switch-line">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app-auth.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const msgBox = document.getElementById('formMsg');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const terms = document.getElementById('terms').checked;

    if(!terms){
      showMsg('Please agree to the Terms of Service to continue.', false);
      return;
    }
    if(password !== confirmPassword){
      showMsg('Passwords do not match.', false);
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';

    const result = await npRegisterUser({
      firstName: document.getElementById('firstName').value.trim(),
      lastName: document.getElementById('lastName').value.trim(),
      email: document.getElementById('email').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      password,
      referralCode: document.getElementById('referralCode').value.trim()
    });

    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Create free account';

    if(result.success){
      showMsg(result.message + ' Redirecting…', true);
      setTimeout(()=> window.location.href = 'dashboard.html', 700);
    } else {
      showMsg(result.message, false);
    }

    function showMsg(text, ok){
      msgBox.textContent = text;
      msgBox.style.display = 'block';
      msgBox.className = 'form-msg ' + (ok ? 'ok' : 'err');
    }
  });
</script>
</body>
</html>
